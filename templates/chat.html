<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>UsChat</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .chat-box {
            background: #1e293b;
            padding: 15px;
            height: 400px;
            overflow-y: scroll;
            border-radius: 10px;
        }

        .message {
            background: #334155;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .me {
            background: #2563eb;
        }

        .file {
            color: #38bdf8;
            display: block;
            margin-top: 5px;
        }

        form {
            margin-top: 15px;
        }

        input[type="text"] {
            width: 60%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        input[type="file"] {
            color: white;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logout {
            background: red;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <span>👤 {{ user }}</span>
        <a class="logout" href="{{ url_for('logout') }}">Logout</a>
    </div>

    <h2>💬 UsChat</h2>

    <div class="chat-box">

        {% for msg in messages %}
            <div class="message {% if msg.sender == user %}me{% endif %}">
                <strong>{{ msg.sender }}</strong><br>
                {{ msg.message }}

                {% if msg.file_name %}
                    <a class="file" href="{{ url_for('uploaded_file', filename=msg.file_name) }}" target="_blank">
                        📎 Datei öffnen
                    </a>
                {% endif %}

                <br>
                <small>{{ msg.created_at }}</small>
            </div>
        {% endfor %}

    </div>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="message" placeholder="Nachricht..." autocomplete="off">
        <input type="file" name="file">
        <button type="submit">Senden</button>
    </form>

</div>

</body>
</html>
