<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UsChat Registrierung</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #06153a;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 60px auto;
            background: #1e2b45;
            padding: 30px;
            border-radius: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .flash {
            background: #334766;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #18b44a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #14943d;
        }

        .bottom-text {
            text-align: center;
            margin-top: 22px;
            font-size: 18px;
        }

        .bottom-text a {
            color: #33aaff;
            text-decoration: none;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>UsChat Registrierung</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Benutzername" required>
            <input type="email" name="email" placeholder="E-Mail" required>
            <input type="password" name="password" placeholder="Passwort" required>
            <button type="submit">Registrieren</button>
        </form>

        <div class="bottom-text">
            Schon ein Konto? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>
</body>
</html>
