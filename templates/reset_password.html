{% extends "base.html" %}

{% block content %}
<h2>Neues Passwort setzen</h2>

<form method="POST">
    <input type="text" name="code" placeholder="Bestätigungscode" required>
    <input type="password" name="password" placeholder="Neues Passwort" required>
    <input type="password" name="confirm_password" placeholder="Passwort wiederholen" required>
    <button type="submit">Passwort ändern</button>
</form>

<p><a href="/login">Zurück zum Login</a></p>
{% endblock %}
